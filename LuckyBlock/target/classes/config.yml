# ============================================================
#   KMC Lucky Block - Configuration
#
#   NOTE: Arena setup (schematic, spawns, lobby) is now managed
#   by KMCCore. See plugins/KMCCore/config.yml and use /kmcarena
#   commands.
# ============================================================

game:
  # Seconds before the game starts after /luckyblock start
  countdown-seconds: 10

  # Max game duration in seconds (0 = no limit, last standing wins)
  max-duration-seconds: 300

  # Radius (in blocks) to scan around the arena origin for yellow concrete
  # Increase if your arena is very large
  scan-radius: 200

# Points awarded for surviving (position → points, before KMC multiplier)
points:
  1: 100
  2: 75
  3: 50
  4: 25

# Kill points are now configured in KMCCore/points.yml

# ============================================================
#   Loot Table — weights determine chance (higher = more common)
# ============================================================
