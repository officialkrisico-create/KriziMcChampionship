# ============================================================
#   Adventure Escape — Configuration
# ============================================================

arena:
  # The world where the race takes place. Set with /adventure setworld <name>
  world: null

  # Race grid spawn points (set with /adventure setspawn — call for each slot)
  spawns: []

  # Startline: a box (two corners) players must cross to start their lap timer
  startline:
    pos1: null
    pos2: null

  # Finishline: same — crossing this ends a lap
  finishline:
    pos1: null
    pos2: null

  # How many laps until the race ends (set with /adventure setlaps <n>)
  laps: 3

game:
  # Countdown before the race starts
  countdown-seconds: 30

  # Max race duration in seconds (0 = no limit, race ends when everyone finishes)
  max-duration-seconds: 600

  # Hide other players' name plates above their head during race (they're distracting)
  hide-nametags: true

  # Give all racers these items at spawn
  starter-items:
    - ELYTRA   # chestplate slot

# Points awarded by finish position (before KMC multiplier)
points:
  # Per-finish placement (1st=320, -10/place, default=0)
  placement:
    1:  320
    2:  310
    3:  300
    4:  290
    5:  280
    6:  270
    7:  260
    8:  250
    9:  240
    10: 230
    11: 220
    12: 210
    13: 200
    14: 190
    15: 180
    16: 170
    17: 160
    18: 150
    19: 140
    20: 130
    21: 120
    22: 110
    23: 100
    24:  90
    25:  80
    26:  70
    27:  60
    28:  50
    29:  40
    30:  30
    31:  20
    32:  10
    "default": 0

  # Bonus for the player who set the fastest single lap
  fastest-lap-bonus: 25

  # Team placement bonus — based on AVERAGE finish position of team members.
  team-avg-placement:
    1: 20
    2: 15
    3: 10
    "default": 0

# ============================================================
#   EFFECT BLOCKS
#
#   When a player walks over one of these materials they get the
#   configured effect(s) for "duration" seconds.
#
#   Supported effect keys:
#     speed        - Speed
#     jump         - Jump Boost
#     haste        - Haste
#     strength     - Strength
#     regen        - Regeneration
#     dolphin      - Dolphin's Grace (underwater)
#     night_vision - Night Vision
#     slow_fall    - Slow Fall
#     levitation   - Levitation
#     fire_res     - Fire Resistance
#     water_breath - Water Breathing
#     invisibility - Invisibility
#
#   Supported equipment keys:
#     elytra                 - chest-slot elytra
#     elytra_rocket          - elytra + fireworks (press space to boost)
#     depth_strider_boots    - diamond boots with Depth Strider III
#     feather_boots          - leather boots with Feather Falling IV
#
#   Each block entry can have:
#     material:      block material (must match Bukkit Material enum)
#     duration:      seconds the effect lasts after stepping on it
#     effects:       list of {type, amplifier}  (amplifier is 0-based)
#     equipment:     list of equipment keys
#     message:       chat message shown to the player
#     sound:         sound played on trigger (optional)
# ============================================================

effect-blocks:
  white_speed:
    material: WHITE_GLAZED_TERRACOTTA
    duration: 5
    effects:
      - {type: speed, amplifier: 2}
    message: "&f⚡ &lSPEED!"
    sound: ENTITY_EXPERIENCE_ORB_PICKUP

  red_jump:
    material: RED_GLAZED_TERRACOTTA
    duration: 4
    effects:
      - {type: jump, amplifier: 3}
    message: "&c🦘 &lJUMP BOOST!"
    sound: ENTITY_RABBIT_JUMP

  light_blue_elytra:
    material: LIGHT_BLUE_GLAZED_TERRACOTTA
    duration: 15
    equipment:
      - elytra_rocket
    message: "&b🪶 &lELYTRA! &7(15s, 5 rockets in je inventaris)"
    sound: ITEM_ARMOR_EQUIP_ELYTRA

  lime_dolphin:
    material: LIME_GLAZED_TERRACOTTA
    duration: 10
    effects:
      - {type: dolphin, amplifier: 0}
      - {type: water_breath, amplifier: 0}
    message: "&a🐬 &lDOLPHIN'S GRACE!"
    sound: ENTITY_DOLPHIN_HAPPY

  cyan_depth_strider:
    material: CYAN_GLAZED_TERRACOTTA
    duration: 10
    equipment:
      - depth_strider_boots
    message: "&3🌊 &lDEPTH STRIDER!"
    sound: ITEM_ARMOR_EQUIP_IRON

  yellow_haste:
    material: YELLOW_GLAZED_TERRACOTTA
    duration: 5
    effects:
      - {type: haste, amplifier: 2}
      - {type: speed, amplifier: 1}
    message: "&e⚡ &lHASTE!"
    sound: ENTITY_ENDER_EYE_LAUNCH

  pink_regen:
    material: PINK_GLAZED_TERRACOTTA
    duration: 5
    effects:
      - {type: regen, amplifier: 1}
    message: "&d❤ &lREGEN!"
    sound: ENTITY_PLAYER_LEVELUP

  purple_levitation:
    material: PURPLE_GLAZED_TERRACOTTA
    duration: 3
    effects:
      - {type: levitation, amplifier: 1}
    message: "&5⬆ &lLEVITATION!"
    sound: ENTITY_SHULKER_SHOOT

  orange_slow_fall:
    material: ORANGE_GLAZED_TERRACOTTA
    duration: 10
    effects:
      - {type: slow_fall, amplifier: 0}
    message: "&6🪂 &lSLOW FALL!"
    sound: ENTITY_PARROT_FLY

  black_night_vision:
    material: BLACK_GLAZED_TERRACOTTA
    duration: 30
    effects:
      - {type: night_vision, amplifier: 0}
    message: "&8👁 &lNIGHT VISION!"
    sound: BLOCK_ENCHANTMENT_TABLE_USE
