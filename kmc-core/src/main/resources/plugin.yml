name: KMCCoreV2
version: '2.0.0'
main: nl.kmc.core.KMCCorePlugin
api-version: '1.21'
description: KMC Tournament Core Platform V2
authors: [ Krizicow ]

softdepend:
  - Citizens
  - WorldEdit
  - FastAsyncWorldEdit

# NOTE: KMCCoreV2 is an API/data library plugin — it registers no commands.
# The /kmc command and kmc.* permissions are owned by KMCCore (V1), which is
# the single tournament runtime. Declaring them here too caused duplicate
# command/permission registration warnings, so they were removed.
