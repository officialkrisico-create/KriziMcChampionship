# KMC Points Configuration V2

kills:
  per-kill: 50
  apply-multiplier: false   # kills are flat-value by default

placement:
  apply-multiplier: true
  # Per-placement overrides (1-based). Falls back to curve below.
  overrides:
    1: 500
    2: 400
    3: 300
    4: 200
    5: 150
    6: 100
    7: 75
    8: 50

team-placement:
  apply-multiplier: true
  1: 1000
  2: 600
  3: 300
  4: 100

bonuses:
  apply-multiplier: false
  double-kill: 25
  triple-kill: 75
  mega-kill: 150
  lucky-block: 50
  survival-per-minute: 5

mvp:
  per-game:
    default:
      kills: 2.0
      points-earned: 1.0
      won: 50.0
    skywars:
      kills: 3.0
      survival-time: 0.5
      won: 100.0
    survival_games:
      kills: 3.0
      survival-time: 0.8
      won: 100.0
    the_bridge:
      goals: 20.0
      kills: 1.5
      won: 75.0
  tournament:
    mvp-awards: 5.0
    kills: 1.0
    points: 0.5
