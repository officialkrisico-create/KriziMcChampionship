# KMC Core V2 Configuration

settings:
  debug: false
  prefix: "&6[KMC]&r"
  language: en

database:
  type: sqlite          # sqlite | mysql
  file: kmc_v2.db

arena:
  lobby-world: world
  lobby-x: 0.5
  lobby-y: 64.0
  lobby-z: 0.5
  lobby-yaw: 0.0
  lobby-pitch: 0.0

tournament:
  name: "Krisi Minecraft Championship"
  total-rounds: 5
  multipliers:
    1: 1.0
    2: 2.0
    3: 3.0
    4: 4.0
    5: 5.0

reconnect:
  enabled: true
  timeout-seconds: 300

recovery:
  auto-snapshot: true
  interval-seconds: 60
  max-snapshots: 20
  snapshot-on-game-start: true
  snapshot-on-game-end: true
  snapshot-on-round-transition: true

leaderboard-bar:
  enabled: true
  update-interval-ticks: 100

scoreboard:
  enabled: true

tablist:
  enabled: true
  header: "&6&lKMC &8| &7Season {season}"
  footer: "&7{online} players online"

teams:
  rood:
    display-name: "Rood"
    color: RED
    tag-color: RED
  oranje:
    display-name: "Oranje"
    color: GOLD
    tag-color: GOLD
  geel:
    display-name: "Geel"
    color: YELLOW
    tag-color: YELLOW
  groen:
    display-name: "Groen"
    color: GREEN
    tag-color: GREEN
  cyaan:
    display-name: "Cyaan"
    color: AQUA
    tag-color: AQUA
  blauw:
    display-name: "Blauw"
    color: BLUE
    tag-color: BLUE
  roze:
    display-name: "Roze"
    color: LIGHT_PURPLE
    tag-color: LIGHT_PURPLE
  wit:
    display-name: "Wit"
    color: WHITE
    tag-color: WHITE
