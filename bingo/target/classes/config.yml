# ================================================================
# Bingo — Configuration
# ================================================================
#
# How worlds work in this plugin:
#
# 1. ONCE — admin pre-builds a "template" world with /bingo savetemplate
#    Template should be a fresh, untouched survival world.
#
# 2. EACH GAME — plugin file-system-copies the template into a temp
#    world (e.g. "bingo_game_1729877234"), loads it, plays the game,
#    then unloads + deletes it on cleanup.
#
# This avoids slow chunk generation per game and gives every game a
# pristine world without affecting the main server world.
# ================================================================

game:
  # Game duration in seconds — 15 minutes
  max-duration-seconds: 900
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # KEEP_INVENTORY on death
  keep-inventory: true
  
  # PvP enabled? (false = teams race independently, no fighting)
  pvp-enabled: false
  
  # Items every player starts with: "MATERIAL:amount"
  starter-kit:
    - "COOKED_BEEF:64"

# ================================================================
# Card composition — items-only, ~40 entries, RNG picks 25
# ================================================================

