name: Bingo
version: 1.0.0
main: nl.kmc.bingo.BingoPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Bingo Teams minigame for KMC tournaments

commands:
  bingo:
    description: Bingo control + view your team's card
    usage: /bingo <card|start|stop|settemplate|setspawn|status|reload>

permissions:
  bingo.admin:
    description: Bingo admin commands
    default: op
