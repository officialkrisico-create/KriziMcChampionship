# ================================================================
# Bingo — Configuration
# ================================================================

game:
  # Game duration in seconds
  max-duration-seconds: 720    # 12 minutes
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Deathmode: KEEP (keep inventory on death) or DROP
  death-mode: KEEP
  
  # Items every player starts with: "MATERIAL:amount" lines
  starter-kit:
    - "COOKED_BEEF:64"
    - "WOODEN_PICKAXE:1"
    - "WOODEN_AXE:1"
    - "WOODEN_SHOVEL:1"
  
  # PvP enabled during the game?
  pvp-enabled: false

# ================================================================
# Card composition
# ================================================================

card:
  distribution:
    collect: 0.60   # 60% collect-item objectives
    craft:   0.25   # 25% craft objectives
    kill:    0.15   # 15% kill objectives (computed from remainder)

  # Format: "MATERIAL:amount" — amount of items required
  collect-pool:
    - "EMERALD:1"
    - "DIAMOND:1"
    - "GOLD_INGOT:4"
    - "IRON_INGOT:8"
    - "COAL:16"
    - "OAK_LOG:32"
    - "WHEAT:16"
    - "APPLE:4"
    - "BREAD:8"
    - "CARROT:8"
    - "POTATO:8"
    - "BEETROOT:4"
    - "PUMPKIN:1"
    - "MELON_SLICE:8"
    - "SUGAR_CANE:8"
    - "BONE:4"
    - "STRING:8"
    - "FEATHER:4"
    - "LEATHER:4"
    - "GUNPOWDER:2"
    - "REDSTONE:8"
    - "LAPIS_LAZULI:8"
    - "FLINT:4"
    - "QUARTZ:4"
    - "BLAZE_ROD:1"
    - "ENDER_PEARL:1"
    - "GHAST_TEAR:1"
    - "MAGMA_CREAM:1"
    - "SLIME_BALL:4"
    - "GLASS:8"
    - "BRICK:4"
    - "CLAY_BALL:4"
    - "EGG:4"
    - "MILK_BUCKET:1"
    - "WATER_BUCKET:1"
    - "LAVA_BUCKET:1"
    - "BOOK:1"
    - "PAPER:8"
    - "CACTUS:4"
    - "BAMBOO:8"

  # Format: "MATERIAL" — must be crafted by player
  craft-pool:
    - "CRAFTING_TABLE"
    - "FURNACE"
    - "CHEST"
    - "SHIELD"
    - "BOW"
    - "WOODEN_SWORD"
    - "STONE_SWORD"
    - "IRON_SWORD"
    - "WOODEN_PICKAXE"
    - "STONE_PICKAXE"
    - "IRON_PICKAXE"
    - "BUCKET"
    - "FISHING_ROD"
    - "OAK_BOAT"
    - "OAK_DOOR"
    - "LADDER"
    - "TORCH"
    - "STICK"
    - "BOWL"
    - "PAINTING"
    - "ITEM_FRAME"
    - "COMPASS"
    - "CLOCK"
    - "MAP"
    - "ARROW"
    - "TNT"

  # Format: "ENTITY:amount"
  kill-pool:
    - "ZOMBIE:1"
    - "SKELETON:1"
    - "CREEPER:1"
    - "SPIDER:1"
    - "WITCH:1"
    - "ENDERMAN:1"
    - "SLIME:1"
    - "PHANTOM:1"
    - "PIG:2"
    - "COW:2"
    - "CHICKEN:2"
    - "SHEEP:2"

# ================================================================
# Scoring (awarded via KMCCore PointsManager)
# ================================================================

points:
  per-square: 8
  per-line: 50
  full-card: 200
  team-first-place: 250
  team-second-place: 150
  team-third-place: 100
  team-participation: 25

# ================================================================
# Arena
# ================================================================

arena:
  # World where the game is played. Must already exist.
  world: ""
  
  # Lobby spawn (where players gather before game)
  lobby: null
  
  # Per-team spawn locations (set with /bingo setteamspawn <teamId>)
  team-spawns: {}
