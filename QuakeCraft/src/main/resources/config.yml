# ================================================================
# QuakeCraft — Configuration
# ================================================================
# Hoe-based weapons. Right-click hoe to fire.
#   Wooden hoe   = Railgun (base, infinite ammo)
#   Iron hoe     = Shotgun (5 uses, spread)
#   Netherite hoe= Sniper (3 uses, long range)
#   Gold hoe     = Machine gun (25 uses, fast)
#   Bone         = Grenade (1 use, throwable)
#   Sugar        = Speed II buff (15 sec, consumed on pickup)
# ================================================================

game:
  # First INDIVIDUAL player to reach this kill count wins
  kill-target: 25
  
  # Maximum game duration. When timer hits 0, player with most kills wins.
  max-duration-seconds: 600
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Respawn delay
  respawn-delay-seconds: 1
  
  # Base railgun cooldown (ms between shots) for the wooden hoe
  railgun-cooldown-ms: 1500
  
  # Maximum range for the base railgun (blocks)
  railgun-max-range: 80
  
  # Whether to allow friendly fire (teammates damage each other)
  friendly-fire: false
  
  # Whether the wooden hoe (base railgun) is given to all players
  give-base-railgun: true
  
  # Apply Speed I to all players for the whole game
  base-speed-boost: true

# ================================================================
# Powerups
# ================================================================

powerups:
  shotgun:
    display-name: "&e&lShotgun"
    material: IRON_HOE
    uses: 5
    cooldown-ms: 800
    bonus-coins: 30
    pellets: 5
    spread-degrees: 8
    max-range: 25
  
  sniper:
    display-name: "&b&lSniper"
    material: NETHERITE_HOE
    uses: 3
    cooldown-ms: 2000
    bonus-coins: 25
    max-range: 200
    show-tracer: true
  
  machine_gun:
    display-name: "&6&lMachine Gun"
    material: GOLDEN_HOE
    uses: 25
    cooldown-ms: 200
    bonus-coins: 40
    max-range: 60
  
  grenade:
    display-name: "&c&lGrenade"
    material: BONE
    uses: 1
    cooldown-ms: 0
    bonus-coins: 50
    explosion-radius: 4.0
    fuse-ticks: 40
  
  speed:
    display-name: "&a&lSpeed II Boost"
    material: SUGAR
    duration-seconds: 15
    bonus-coins: 15

# ================================================================
# Powerup spawning
# ================================================================

powerup-spawning:
  enabled: true
  interval-seconds: 30
  despawn-seconds: 60
  weights:
    sniper: 20
    grenade: 5
    shotgun: 25
    machine_gun: 30
    speed: 30

# ================================================================
# Killstreaks
# ================================================================

killstreaks:
  enabled: true
  rewards:
    3:
      bonus-points: 10
      message: "&e{player} &7is op een streak! &e×3"
    5:
      bonus-points: 25
      speed-seconds: 10
      message: "&6{player} &7is HOT! &6×5 &c(SPEED BOOST)"
    7:
      bonus-points: 50
      message: "&c{player} &7is &c&lUNSTOPPABLE! &7×7"
    10:
      bonus-points: 100
      message: "&4&l{player} &c&lDOMINATING! &7×10"

# ================================================================
# Points (awarded via KMCCore PointsManager)
# Team totals aggregate automatically via per-kill points.
# ================================================================

points:
  per-kill: 10
  first-place: 250
  second-place: 150
  third-place: 100
  participation: 25

# ================================================================
# Arena (set via /qc commands)
# ================================================================

arena:
  world: ""
  spawns: []
  powerup-locations: {}
