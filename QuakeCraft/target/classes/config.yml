# ================================================================
# QuakeCraft — Configuration
# ================================================================
# Hoe-based weapons. Right-click hoe to fire.
#   Wooden hoe   = Railgun (base, infinite ammo)
#   Iron hoe     = Shotgun (5 uses, spread)
#   Netherite hoe= Sniper (3 uses, long range)
#   Gold hoe     = Machine gun (25 uses, fast)
#   Bone         = Grenade (1 use, throwable)
#   Sugar        = Speed II buff (15 sec, consumed on pickup)
# ================================================================

game:
  # First INDIVIDUAL player to reach this kill count wins
  kill-target: 25
  
  # Maximum game duration. When timer hits 0, player with most kills wins.
  max-duration-seconds: 600
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Respawn delay
  respawn-delay-seconds: 1
  
  # Base railgun cooldown (ms between shots) for the wooden hoe
  railgun-cooldown-ms: 1500
  
  # Maximum range for the base railgun (blocks)
  railgun-max-range: 80
  
  # Whether to allow friendly fire (teammates damage each other)
  friendly-fire: false
  
  # Whether the wooden hoe (base railgun) is given to all players
  give-base-railgun: true
  
  # Apply Speed I to all players for the whole game
  base-speed-boost: true

# ================================================================
# Generic lifecycle (BaseGameManager)
# ================================================================
# QuakeCraft drives its OWN presentation (see start-flow / start-sequence
# below), so the generic base countdown + grace are disabled to stay out of
# the way. Leave these at 0 unless you know what you're doing.
games:
  quake_craft:
    countdown: 0
    grace-period: 0

# ================================================================
# Match start flow — state machine
# ================================================================
# /qc start does NOT drop players straight into combat. It runs a presentation
# sequence while everyone is frozen:
#   INITIALIZING → INTRODUCTION → TUTORIAL → COUNTDOWN → GO (RUNNING)
# Each phase can be toggled on/off and its duration tuned. Combat, scoring,
# powerups and abilities only go live at GO. This framework is reusable by
# future KMC minigames (flyovers, cinematics, team intros, announcers, …).

start-flow:
  introduction: true   # big "QUAKECRAFT" title card
  tutorial: true       # gradual how-to-play chat messages
  countdown: true      # 5..4..3..2..1 titles + sound
  flyover: false       # reserved — cinematic map flyover (future module)

start-sequence:
  intro-seconds: 5
  tutorial-seconds: 10
  countdown-seconds: 5
  intro-subtitle: "Eerste die de kill-limiet haalt wint"
  # Optional override of the tutorial lines. Empty = built-in defaults.
  # Lines are spread evenly across tutorial-seconds. Colour codes with &.
  tutorial-messages: []

# ================================================================
# Team gameplay
# ================================================================
# Friendly fire is globally impossible whenever friendly-fire (above) is false:
# every weapon, gadget and the hit handler route through TeamUtil.areTeammates,
# so future weapons inherit the protection automatically (no per-weapon logic).
# Team members also spawn grouped together and respawn near living teammates.

team-awareness:
  # Show teammates glowing in their team colour (NOTE: relies on KMCCore
  # scoreboard team colours; off by default to keep enemies un-highlighted).
  glow: false

# ================================================================
# Powerups
# ================================================================

powerups:
  shotgun:
    display-name: "&e&lShotgun"
    material: IRON_HOE
    uses: 5
    cooldown-ms: 800
    bonus-coins: 30
    pellets: 5
    spread-degrees: 8
    max-range: 25
  
  sniper:
    display-name: "&b&lSniper"
    material: NETHERITE_HOE
    uses: 3
    cooldown-ms: 2000
    bonus-coins: 25
    max-range: 200
    show-tracer: true
  
  machine_gun:
    display-name: "&6&lMachine Gun"
    material: GOLDEN_HOE
    uses: 25
    # Cooldown between right-clicks. Each click fires a burst (see below)
    cooldown-ms: 200
    bonus-coins: 40
    max-range: 60
    # Number of shots per right-click — gives sustained fire feel
    burst-count: 3
    # Ticks between shots in the burst (1 tick = 50ms; 2 ticks = 100ms)
    burst-delay-ticks: 2
  
  grenade:
    display-name: "&c&lGrenade"
    material: BONE
    uses: 1
    cooldown-ms: 0
    bonus-coins: 50
    explosion-radius: 4.0
    fuse-ticks: 40

  bazooka:
    display-name: "&4&lBazooka"
    material: DIAMOND_HOE
    uses: 2
    # Cooldown between rockets (ms)
    cooldown-ms: 2500
    bonus-coins: 45
    # On impact the rocket bursts into a RAILGUN NOVA (no AoE blast):
    #   ray-count railgun rays fly out in every direction, ray-length blocks each.
    # Any enemy a ray crosses takes a railgun hit. Teammates are ignored.
    ray-length: 10
    ray-count: 24
    # How far the rocket travels before bursting (blocks)
    max-range: 60
    # Rocket travel speed (blocks per tick)
    projectile-speed: 1.2

  grapple:
    display-name: "&a&lGrappling Hook"
    material: FISHING_ROD
    uses: 5
    cooldown-ms: 1000
    bonus-coins: 20
    # How far you can grapple onto a block (blocks)
    max-range: 30
    # Pull strength toward the anchor
    pull-strength: 1.4
    # Extra upward kick so you arc onto ledges
    up-bias: 0.35

  proximity_mine:
    display-name: "&c&lProximity Mine"
    material: TRIPWIRE_HOOK
    uses: 2
    bonus-coins: 35
    # How close an enemy must get to trip the mine (blocks)
    trigger-radius: 2.5
    # Blast radius once it detonates
    explosion-radius: 4.0
    # Delay before the mine arms (so the placer isn't blown up)
    arm-delay-ms: 1000

  smoke_bomb:
    display-name: "&8&lSmoke Bomb"
    material: GUNPOWDER
    uses: 2
    cooldown-ms: 0
    bonus-coins: 20
    # Ticks before the thrown bomb pops into smoke
    fuse-ticks: 20
    # How long the smoke cloud lasts
    duration-seconds: 6
    # Cloud radius (blinds enemies inside)
    radius: 4.0

  impulse_cannon:
    display-name: "&b&lImpulse Cannon"
    material: HEAVY_CORE
    uses: 3
    rarity: rare
    cooldown-ms: 1500
    bonus-coins: 25
    max-range: 25
    radius: 5.0
    knockback-strength: 1.6
    self-knockback-multiplier: 1.2

  jump_pad_grenade:
    display-name: "&a&lJump Pad Grenade"
    material: SLIME_BALL
    uses: 2
    rarity: common
    bonus-coins: 15
    fuse-ticks: 16
    lifetime-seconds: 8
    radius: 1.5
    launch-strength: 1.1

  recon_dart:
    display-name: "&e&lRecon Dart"
    material: SPECTRAL_ARROW
    uses: 3
    rarity: rare
    cooldown-ms: 1500
    bonus-coins: 20
    max-range: 60
    tracking-duration-seconds: 8

  freeze_grenade:
    display-name: "&b&lFreeze Grenade"
    material: PACKED_ICE
    uses: 2
    rarity: rare
    bonus-coins: 25
    fuse-ticks: 24
    radius: 4.5
    duration-seconds: 4
    # Slowness amplifier (0=Slowness I ... higher = slower)
    slow-amplifier: 3

  flashbang:
    display-name: "&f&lFlashbang"
    material: ECHO_SHARD
    uses: 2
    rarity: rare
    bonus-coins: 25
    fuse-ticks: 20
    max-distance: 12
    duration-seconds: 4

  airstrike:
    display-name: "&c&lAirstrike"
    material: FIREWORK_ROCKET
    uses: 1
    rarity: legendary
    cooldown-ms: 1000
    bonus-coins: 60
    mark-range: 80
    # Ticks between marking and the first impact
    delay-ticks: 60
    # Area the strikes scatter across
    strike-radius: 6.0
    # Number of explosions
    impacts: 6
    # Instant-kill radius of each individual impact
    impact-radius: 3.0

  hologram_decoy:
    display-name: "&d&lHologram Decoy"
    material: ARMOR_STAND
    uses: 2
    rarity: epic
    bonus-coins: 30
    # How long the decoy stands before vanishing
    lifetime-seconds: 10

  mimic_device:
    display-name: "&5&lMimic Device"
    material: PLAYER_HEAD
    uses: 2
    rarity: epic
    cooldown-ms: 2000
    bonus-coins: 30
    # How long the visual disguise lasts
    duration-seconds: 12
    # Which teams may be mimicked (empty = any other team)
    allowed-targets: []

  speed:
    display-name: "&a&lSpeed II Boost"
    material: SUGAR
    rarity: common
    duration-seconds: 15
    bonus-coins: 15

# ================================================================
# Powerup spawning
# ================================================================

powerup-spawning:
  enabled: true
  interval-seconds: 30
  despawn-seconds: 60
  weights:
    sniper: 20
    grenade: 5
    bazooka: 8
    grapple: 18
    proximity_mine: 12
    smoke_bomb: 15
    impulse_cannon: 12
    jump_pad_grenade: 16
    recon_dart: 12
    freeze_grenade: 10
    flashbang: 10
    airstrike: 3       # legendary — very rare
    hologram_decoy: 8
    mimic_device: 8
    shotgun: 25
    machine_gun: 30
    speed: 30

# ================================================================
# Jump pads
# ================================================================
# Place with /qc setjumppad [height] [forward] while standing on the block you
# want to turn into a pad. Each pad stores its OWN strength, so you can mix
# 3-block hops and 7-block launches around the map. Works on any block type.
#
#   /qc setjumppad           → uses default-height below
#   /qc setjumppad 7         → ~7 blocks high
#   /qc setjumppad 5 0.8     → ~5 high with a strong forward boost

jump-pad:
  # Default jump height (blocks) when /qc setjumppad is run with no number.
  default-height: 4.0
  # Default forward boost in the direction the player is facing.
  forward: 0.4

# ================================================================
# Killstreaks
# ================================================================

killstreaks:
  enabled: true
  rewards:
    3:
      bonus-points: 10
      message: "&e{player} &7is op een streak! &e×3"
    5:
      bonus-points: 25
      speed-seconds: 10
      message: "&6{player} &7is HOT! &6×5 &c(SPEED BOOST)"
    7:
      bonus-points: 50
      message: "&c{player} &7is &c&lUNSTOPPABLE! &7×7"
    10:
      bonus-points: 100
      message: "&4&l{player} &c&lDOMINATING! &7×10"

# ================================================================
# Points (awarded via KMCCore PointsManager)
# Team totals aggregate automatically via per-kill points.
# ================================================================

points:
  # Per kill
  per-kill: 12

  # Win-game bonus — the individual player with the most kills at
  # game end (1st place ranked by kills) gets this.
  win-game: 50

  # Revenge kill bonus — when you kill the player who killed you
  # within revenge-window-ms milliseconds.
  revenge-kill-bonus: 25
  revenge-window-ms: 10000

  # Final team placement bonuses (kept as-is for tournament integration).
  # These flow through KMCCore at tournament end, not per-game.
  team-first-place: 250
  team-second-place: 150
  team-third-place: 100
  team-participation: 25

  # Per-individual placement (used by endGame()) — kept simple,
  # only top 3 awarded explicitly. Ties broken by deaths (asc).
  first-place: 0      # was 250 — now 0 because win-game replaces it
  second-place: 0
  third-place: 0
  participation: 0

# ================================================================
# Arena (set via /qc commands)
# ================================================================

arena:
  world: ""
  spawns: []
  powerup-locations: {}

# ================================================================
# Sound system
# ================================================================
# Every weapon/gadget event is played through a configurable identifier so you
# can re-theme the game — including with a resource pack — without code changes.
#
# Format per entry:  NAME[:volume[:pitch]]
#   • NAME that matches a vanilla sound enum  → played as a vanilla sound
#       e.g. "ENTITY_FIREWORK_ROCKET_BLAST:1.0:0.5"
#   • NAME of the form "namespace:path"        → played as a resource-pack sound
#       e.g. "kmc:airstrike.whistle:1.0:1.0"
#
# Any key left out falls back to a sensible built-in sound, so nothing is ever
# silent. Add your own keys (e.g. railgun.fire) to override existing weapons.

sounds:
  # Universal kill-confirmation ping (played to the shooter)
  kill.confirm: "BLOCK_NOTE_BLOCK_PLING:1.0:2.0"

  # Match start flow
  match.intro:     "UI_TOAST_CHALLENGE_COMPLETE:1.0:1.0"
  match.countdown: "BLOCK_NOTE_BLOCK_HAT:1.0:1.2"
  match.start:     "ENTITY_PLAYER_LEVELUP:1.0:1.2"

  # New gadgets
  impulse_cannon.fire:   "ENTITY_WARDEN_SONIC_BOOM:1.0:1.4"
  impulse_cannon.impact: "ENTITY_GENERIC_EXPLODE:1.0:0.6"
  jump_pad_grenade.throw:  "ENTITY_SLIME_JUMP:1.0:1.2"
  jump_pad_grenade.deploy: "BLOCK_SLIME_BLOCK_PLACE:1.0:1.0"
  recon_dart.fire: "ENTITY_ARROW_SHOOT:1.0:1.6"
  recon_dart.lock: "BLOCK_BEACON_ACTIVATE:1.0:2.0"
  freeze_grenade.throw: "BLOCK_GLASS_BREAK:0.8:1.5"
  freeze_grenade.burst: "BLOCK_GLASS_BREAK:1.2:0.8"
  flashbang.throw:  "ENTITY_SNOWBALL_THROW:1.0:1.2"
  flashbang.bounce: "BLOCK_ANVIL_LAND:0.4:1.8"
  flashbang.flash:  "ENTITY_GENERIC_EXPLODE:1.2:2.0"
  flashbang.ring:   "ITEM_TOTEM_USE:0.6:2.0"
  airstrike.marker:   "BLOCK_BEACON_POWER_SELECT:1.0:0.5"
  airstrike.incoming: "EVENT_RAID_HORN:0.7:1.0"
  airstrike.whistle:  "ENTITY_FIREWORK_ROCKET_LARGE_BLAST:1.0:0.6"
  decoy.deploy: "ENTITY_ALLAY_ITEM_GIVEN:1.0:0.8"
  decoy.pop:    "ENTITY_ALLAY_DEATH:1.0:1.2"
  mimic_device.activate:   "ENTITY_ILLUSIONER_CAST_SPELL:1.0:1.0"
  mimic_device.deactivate: "ENTITY_ILLUSIONER_MIRROR_MOVE:1.0:1.2"

  # Rarity stingers (global)
  rarity.legendary: "UI_TOAST_CHALLENGE_COMPLETE:1.0:1.0"
  rarity.epic:      "BLOCK_NOTE_BLOCK_BELL:0.7:1.2"
  rarity.rare:      "BLOCK_NOTE_BLOCK_BELL:0.7:1.4"
