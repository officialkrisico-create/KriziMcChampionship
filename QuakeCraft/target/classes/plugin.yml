name: QuakeCraft
version: 1.0.0
main: nl.kmc.quake.QuakeCraftPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Fast-paced railgun deathmatch for KMC tournaments

commands:
  quakecraft:
    description: QuakeCraft control + setup
    aliases: [qc, quake]
    usage: /qc <start|stop|setworld|setspawn|clearspawns|setpowerup|status|reload>
    permission: quake.admin

permissions:
  quake.admin:
    description: QuakeCraft admin commands
    default: op
