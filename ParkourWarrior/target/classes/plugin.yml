name: ParkourWarrior
version: 1.0.0
main: nl.kmc.parkour.ParkourWarriorPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Parkour Warrior race minigame for KMC tournaments

commands:
  parkourwarrior:
    description: Parkour Warrior control + setup
    aliases: [pkw, parkour]
    usage: /pkw <start|stop|setworld|setstart|addcheckpoint|...|status>
    permission: parkour.admin

permissions:
  parkour.admin:
    description: Parkour admin commands
    default: op
