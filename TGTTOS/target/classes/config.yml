# ================================================================
# TGTTOS — Configuration
# ================================================================
# Multi-round race minigame. Each round picks one map from the pool;
# players race from start to a finish region; deaths respawn at start.

game:
  # Number of rounds per game (default 3)
  round-count: 3
  
  # Per-round race timer (seconds)
  round-duration-seconds: 90
  
  # Pre-round countdown
  countdown-seconds: 10
  
  # Time between rounds (seconds)
  intermission-seconds: 8

points:
  # Per-round placement (top 5 explicitly specified; 6th+ get 0)
  round-placement:
    1: 80
    2: 70
    3: 65
    4: 60
    5: 55
    "default": 0

  # When a TEAM finishes (all members done in a round), team gets a bonus.
  # +25 per member for first team, -5 per team rank, floor 0.
  # 1st team = 25 each, 2nd team = 20, 3rd = 15, 4th = 10, 5th = 5, 6+ = 0.
  team-finish-bonus:
    1: 25
    2: 20
    3: 15
    4: 10
    5:  5
    "default": 0

  # Final per-game placement bonuses (kept for tournament integration).
  first-place: 250
  second-place: 150
  third-place: 100
  participation: 25

# Maps (set via /tgttos commands)
maps: {}
