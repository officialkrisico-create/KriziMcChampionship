# ================================================================
# TGTTOS — Configuration
# ================================================================
# Multi-round race minigame. Each round picks one map from the pool;
# players race from start to a finish region; deaths respawn at start.

game:
  # One TGTTOS game = this many maps, played in sequence (Map 1..5).
  # Points accumulate across all maps; final standings are calculated only
  # after the last map, and KMC points are awarded once at that point.
  maps-per-game: 5

  # Dynamic map finish: once this % of the field has crossed the finish line,
  # a countdown starts for the remaining racers.
  finish-threshold-percent: 50

  # Length of that countdown (seconds). 120 = "2 minutes to finish".
  finish-countdown-seconds: 120

  # Safety cap: if NOBODY hits the 50% threshold, force the countdown after
  # this many seconds of racing so a map can never stall forever. 0 disables.
  max-map-seconds: 300

  # Pre-game countdown
  countdown-seconds: 10

  # Time between maps (seconds)
  intermission-seconds: 8

points:
  # Per-round placement (top 5 explicitly specified; 6th+ get 0)
  round-placement:
    1: 80
    2: 70
    3: 65
    4: 60
    5: 55
    "default": 0

  # When a TEAM finishes (all members done in a round), team gets a bonus.
  # +25 per member for first team, -5 per team rank, floor 0.
  # 1st team = 25 each, 2nd team = 20, 3rd = 15, 4th = 10, 5th = 5, 6+ = 0.
  team-finish-bonus:
    1: 25
    2: 20
    3: 15
    4: 10
    5:  5
    "default": 0

  # Final per-game placement bonuses (kept for tournament integration).
  first-place: 250
  second-place: 150
  third-place: 100
  participation: 25

# Maps (set via /tgttos commands)
maps: {}
