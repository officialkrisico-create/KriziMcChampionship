# ================================================================
# Survival Games — Configuration
# ================================================================

game:
  # Pre-game countdown — players locked on pedestals
  countdown-seconds: 30
  
  # Bloodbath grace period (just sets the mode label, PvP is on the
  # whole time — but the cornucopia chests are the focus)
  grace-seconds: 10
  
  # Max active phase duration. When timer expires, ranks by alive
  # → kills → elim order.
  max-duration-seconds: 600       # 10 min
  
  # Trigger deathmatch this many seconds INTO active phase.
  # E.g. with max=600 and trigger=420, deathmatch starts at 7m mark.
  deathmatch-trigger-seconds: 420
  
  # World border shrink duration during deathmatch (seconds)
  deathmatch-shrink-seconds: 90
  
  # Inner radius treated as "cornucopia tier" loot
  cornucopia-radius: 15
  
  # Async chest scanning batch size (columns per tick)
  columns-per-tick: 16

points:
  # Per-kill
  per-kill: 35

  # Bonus when ANY player dies — every still-alive player gets this.
  # Replaces the old "survival-bonus" key.
  living-while-someone-dies: 5

  # Bonus when a WHOLE TEAM is eliminated — every still-alive
  # individual player gets this (regardless of which team they're on).
  living-while-team-dies: 20

  # Winner (last alive)
  win: 200

  # Final personal placement bonuses (mirrors SkyWars curve).
  # 1st = 250, then -10 per place, floor 0.
  placement:
    1:  250
    2:  240
    3:  230
    4:  220
    5:  210
    6:  200
    7:  190
    8:  180
    9:  170
    10: 160
    11: 150
    12: 140
    13: 130
    14: 120
    15: 110
    16: 100
    17:  90
    18:  80
    19:  70
    20:  60
    21:  50
    22:  40
    23:  30
    24:  20
    25:  10
    "default": 0     # 26th and beyond get 0


# ================================================================
# Loot tables
# ================================================================

