    - { material: DIAMOND_SWORD, min: 1, max: 1, chance: 0.15 }
    - { material: IRON_HELMET, min: 1, max: 1, chance: 0.4 }
    - { material: IRON_CHESTPLATE, min: 1, max: 1, chance: 0.4 }
    - { material: IRON_LEGGINGS, min: 1, max: 1, chance: 0.35 }
    - { material: IRON_BOOTS, min: 1, max: 1, chance: 0.35 }
    - { material: DIAMOND_HELMET, min: 1, max: 1, chance: 0.1 }
    - { material: DIAMOND_CHESTPLATE, min: 1, max: 1, chance: 0.08 }
    - { material: BOW, min: 1, max: 1, chance: 0.6, enchants: { POWER: 1 } }
