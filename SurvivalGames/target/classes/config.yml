    - { material: LEATHER_LEGGINGS, min: 1, max: 1, chance: 0.3 }
    - { material: LEATHER_BOOTS, min: 1, max: 1, chance: 0.3 }
    - { material: CHAINMAIL_HELMET, min: 1, max: 1, chance: 0.15 }
    - { material: CHAINMAIL_CHESTPLATE, min: 1, max: 1, chance: 0.12 }
