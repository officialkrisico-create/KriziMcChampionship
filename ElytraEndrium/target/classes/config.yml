# ================================================================
# Elytra Endrium — Configuration
# ================================================================
# Race through checkpoint hoops with an elytra. Optional boost hoops
# give velocity kicks. Crash = auto-relaunch from last checkpoint.
# ================================================================

game:
  # Maximum game duration. When timer expires, ranking is by points
  # (most checkpoints = best). Default 8 minutes.
  max-duration-seconds: 480
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # End the game as soon as the FIRST player finishes? Or let the
  # rest keep racing for placement.
  end-on-first-finish: false
  
  # Bonus points for crossing the finish line (last checkpoint)
  finish-bonus: 100
  
  # Initial forward velocity at GO! (units per tick)
  launch-speed: 1.5
  
  # Velocity kick after a crash respawn (forward, in respawn's facing direction)
  relaunch-speed: 1.2
  
  # How long must a player be on the ground / in water before they're
  # treated as crashed (ms). Lower = more aggressive crash detection.
  ground-grace-ms: 1500

# ================================================================
# Scoring (awarded via KMCCore PointsManager)
# ================================================================

points:
  # Default points per checkpoint if not set per-checkpoint
  default-checkpoint-points: 10
  
  # Per-placement bonuses
  first-place: 250
  second-place: 150
  third-place: 100
  participation: 25

# ================================================================
# Course (set via /ee commands)
# ================================================================

course:
  world: ""
  launch-spawn: null
  checkpoints: {}
  boost-hoops: {}
