name: ElytraEndrium
version: 1.0.0
main: nl.kmc.elytra.ElytraEndriumPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Elytra race/collection minigame for KMC tournaments

commands:
  elytraendrium:
    description: ElytraEndrium control + setup
    aliases: [ee, elytra]
    usage: /ee <start|stop|setworld|setlaunch|cp|...>
    permission: elytra.admin

permissions:
  elytra.admin:
    description: Elytra admin commands
    default: op
