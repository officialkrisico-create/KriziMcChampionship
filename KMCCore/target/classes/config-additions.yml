# ================================================================
# CONFIG ADDITIONS — append to your existing KMCCore/config.yml
# ================================================================

# ----------------------------------------------------------------
# Spectator UX (Module #1)
# ----------------------------------------------------------------
spectator:
  # When a player dies in any game, give them the spectator compass +
  # leader tracker. Set false to use vanilla spectator only.
  enabled: true

# ----------------------------------------------------------------
# Audio / Ambience (Module #3)
# ----------------------------------------------------------------
audio:
  # Plays a low-volume note-block loop in the lobby
  lobby-ambient: true
  # Plays a victory fanfare when a game ends
  victory-fanfare: true
  # Plays a defeat sting when a player is eliminated
  defeat-sting: true
  # Note: countdown ticks are managed per-game, not here

# ----------------------------------------------------------------
# Boss bar leaderboard (Module #5)
# ----------------------------------------------------------------
leaderboard-bar:
  # Show top-3 teams in a boss bar (suppressed during games)
  enabled: true
  # Refresh interval in ticks (40 = 2 seconds)
  refresh-ticks: 40

# ----------------------------------------------------------------
# Automation / Ready-up (Module #7)
# ----------------------------------------------------------------
automation:
  # Use ready-up between games (false = old behaviour)
  use-ready-check: true
  # Max time players have to ready up before automation continues
  ready-timeout-seconds: 60

# ----------------------------------------------------------------
# Health monitor (Module #17)
# ----------------------------------------------------------------
health:
  # Enable auto-recovery when stuck states detected
  auto-recover: true
  # A game running longer than this is considered stuck (default 15min)
  stuck-game-seconds: 900
  # Scoreboard lock held longer than this is considered stuck (5min)
  stuck-scoreboard-seconds: 300
  # No game has started in N seconds during automation = automation hang
  automation-gap-seconds: 120

# ----------------------------------------------------------------
# Discord webhook (Module #18)
# ----------------------------------------------------------------
discord:
  # Set to true and provide webhook-url to enable
  enabled: false
  webhook-url: ""
  username: "KMC Tournament"
  avatar-url: ""
  post:
    game-start: true
    game-end: true
    round-start: true
    tournament-start: true
    tournament-end: true
    health-alerts: true   # only WARNING/CRITICAL events

# ----------------------------------------------------------------
# Map rotation (Module #20)
# ----------------------------------------------------------------
# Map definitions are stored in maps.yml (auto-created).
# Here you only set per-game defaults.
map-rotation:
  # If a game has multiple maps configured, what mode to default to
  # when no specific mode is set: RANDOM, WEIGHTED, VOTE, SEQUENCE, FIXED
  default-mode: RANDOM
  # Voting window length when mode = VOTE
  vote-duration-seconds: 20
