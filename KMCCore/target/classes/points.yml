# ============================================================
#   KMC Core - Points Rewards Configuration
#
#   This file defines EVERY way players can earn points during
#   the tournament. Multipliers from the current round apply on
#   top of these base values UNLESS noted otherwise.
#
#   Game design note: kills are flat (no multiplier) so aggression
#   is always valuable. Placement points ARE multiplied so later
#   rounds become more decisive.
# ============================================================

# -----------------------------------------------------------------------
# KILL REWARDS
# Flat points per kill — NOT multiplied by the round multiplier.
# Applies to every game during the tournament.
# -----------------------------------------------------------------------
kills:
  # Base points awarded per kill
  per-kill: 50

  # Set to true if you DO want kills to be multiplied by the round multiplier
  apply-multiplier: false

# -----------------------------------------------------------------------
# PLACEMENT REWARDS (outsurviving / finishing position)
# These scale smoothly from position 1 down to a configurable max.
# Round multiplier DOES apply to these.
#
# Formula: position 1 gets "first-place" points.
# Position N gets: max(last-place, first-place - (position-1) * decrement)
# This produces a smooth curve, e.g.:
#   Pos 1  = 500
#   Pos 2  = 485
#   Pos 3  = 470
#   ...
#   Pos 32 = 35
#   Pos 33+ = 10 (last-place floor)
# -----------------------------------------------------------------------
placement:
  # Points for 1st place (before multiplier)
  first-place: 500

  # Floor — anyone placing below max-tracked-position gets this
  last-place: 10

  # How many positions to track with a decreasing curve.
  # After this position everyone gets last-place points.
  max-tracked-position: 32

  # Round multiplier applies
  apply-multiplier: true

  # Explicit overrides for specific positions (optional)
  # These take priority over the smooth curve above.
  overrides:
    1: 500
    2: 400
    3: 325
    4: 275
    5: 225
    6: 200
    7: 175
    8: 150
    # Position 9-31 uses the smooth-curve formula
    32: 10

# -----------------------------------------------------------------------
# TEAM REWARDS
# Separate from player placement — these reward the whole team when
# a team-game ends with their team on top.
# -----------------------------------------------------------------------
team-placement:
  first-place: 1000
  second-place: 600
  third-place: 300
  fourth-place: 100
  apply-multiplier: true

# -----------------------------------------------------------------------
# BONUS REWARDS (Lucky Block + other special events)
# -----------------------------------------------------------------------
bonus:
  # Lucky Block "bonus points" loot entry value
  lucky-block-bonus: 50

  # Multi-kill streaks (in a single game)
  double-kill:  25   # extra on top of kill reward
  triple-kill:  75
  mega-kill:   150   # 5+ kills
  apply-multiplier: false

# -----------------------------------------------------------------------
# PENALTIES (optional — negative points)
# Set to 0 to disable.
# -----------------------------------------------------------------------
penalties:
  # Self-destruction (void, fall damage with no killer, etc.)
  self-death: 0
  # Leaving mid-game
  leave-during-game: 0
