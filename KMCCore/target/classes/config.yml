# ============================================================
#   KMC Core - Main Configuration
#   Krizi Minecraft Championship
# ============================================================

# Plugin settings
settings:
  debug: false
  language: nl  # nl = Dutch, en = English (future)
  prefix: "&6[&eKMC&6] &r"

# -----------------------------------------------------------------------
# Arena
# -----------------------------------------------------------------------
arena:
  # Global lobby/waiting room location
  # Set with: /kmcarena setlobby
  lobby: null

# -----------------------------------------------------------------------
# Automation
# -----------------------------------------------------------------------
automation:
  # Seconds of lobby time between games (countdown bossbar)
  intermission-seconds: 30

  # Seconds between vote closing and game actually starting
  prestart-seconds: 10

  # How many games are played per round before the multiplier goes up
  games-per-round: 3

# -----------------------------------------------------------------------
# Database
# -----------------------------------------------------------------------
database:
  # Options: yaml, sqlite
  type: sqlite
  # Only used if type is sqlite
  file: kmccore.db

# -----------------------------------------------------------------------
# Tournament settings
# -----------------------------------------------------------------------
tournament:
  name: "Krizi Minecraft Championship"
  total-rounds: 8
  current-round: 1
  active: false

  # Multiplier per round (round number -> multiplier)
  # Round 1 = 1x, Round 2 = 1.5x, Round 3 = 2x, etc.
  multipliers:
    1: 1.0
    2: 1.5
    3: 2.0
    4: 2.5
    5: 3.0
    6: 3.5
    7: 4.0
    8: 5.0



# -----------------------------------------------------------------------
# Teams
# -----------------------------------------------------------------------
teams:
  max-players-per-team: 4
  # Team chat prefix visible in chat
  chat-prefix-format: "&8[&r{team_color}{team_name}&8] &r{player_name}&7: {message}"

  # Pre-defined teams (can be edited, names must stay unique)
  list:
    rode_ratten:
      display-name: "Rode Ratten"
      color: RED
      chat-color: "&c"
      # Chat code for nametag (used in scoreboard teams)
      tag-color: "RED"

    oranje_otters:
      display-name: "Oranje Otters"
      color: GOLD
      chat-color: "&6"
      tag-color: "GOLD"

    gele_gnoes:
      display-name: "Gele Gnoes"
      color: YELLOW
      chat-color: "&e"
      tag-color: "YELLOW"

    groene_goudvissen:
      display-name: "Groene Goudvissen"
      color: GREEN
      chat-color: "&a"
      tag-color: "GREEN"

    blauwe_bavianen:
      display-name: "Blauwe Bavianen"
      color: BLUE
      chat-color: "&9"
      tag-color: "BLUE"

    paarse_palingen:
      display-name: "Paarse Palingen"
      color: DARK_PURPLE
      chat-color: "&5"
      tag-color: "DARK_PURPLE"

    roze_rendieren:
      display-name: "Roze Rendieren"
      color: LIGHT_PURPLE
      chat-color: "&d"
      tag-color: "LIGHT_PURPLE"

    witte_wespen:
      display-name: "Witte Wespen"
      color: WHITE
      chat-color: "&f"
      tag-color: "WHITE"

# -----------------------------------------------------------------------
# Games
# -----------------------------------------------------------------------
games:
  # Minimum rounds before same game can repeat
  repeat-cooldown: 2

  # Enable voting system (players vote for next game)
  voting-enabled: true
  # Voting duration in seconds
  voting-duration: 30
  # Number of options shown in vote
  voting-options: 3

  # Available game pool
  list:
    team_skywars:
      display-name: "Team Skywars"
      icon: BOW
      min-players: 2
      schematic: team_skywars.schem

    tgttos:
      display-name: "TGTTOS"
      icon: PINK_GLAZED_TERRACOTTA
      min-players: 2

    the_bridge:
      display-name: "The Bridge"
      icon: WHITE_WOOL
      min-players: 2

    survival_games:
      display-name: "Survival Games"
      icon: COOKED_PORK
      min-players: 2

    quake_craft:
      display-name: "Quake Craft"
      icon: WOODEN_HOE
      min-players: 2

    mob_mayhem:
      display-name: "Mob Mayhem"
      icon: ZOMBIE_HEAD
      min-players: 2

    adventure_escape:
      display-name: "Adventure Escape"
      icon: LEATHER_BOOTS
      min-players: 1

    parkour_warrior:
      display-name: "Parkour Warrior"
      icon: LEATHER_BOOTS
      min-players: 1

    spleef_teams:
      display-name: "Spleef Teams"
      icon: WOODEN_SHOVEL
      min-players: 2

    bingo_teams:
      display-name: "Bingo Teams"
      icon: PAPER
      min-players: 2

    elytra_endrium:
      display-name: "Elytra Endrium"
      icon: ELYTRA
      min-players: 2

    tnt_tag:
      display-name: "TNT TAG"
      icon: TNT
      min-players: 2

# -----------------------------------------------------------------------
# Points
# -----------------------------------------------------------------------
# All point rewards (kills, placement, bonuses) are configured in
# plugins/KMCCore/points.yml — see that file for details.


# -----------------------------------------------------------------------
# Scoreboard (sidebar)
# -----------------------------------------------------------------------
scoreboard:
  enabled: true
  update-interval: 20  # ticks (20 = 1 second)
  title: "&6&lKMC &e&lTournament"

# -----------------------------------------------------------------------
# Tablist
# -----------------------------------------------------------------------
tablist:
  header: "\n&6&lKrizi Minecraft Championship\n&7Round: &e{round} &8| &7Multiplier: &e{multiplier}x\n"
  footer: "\n&7Team: {team_color}{team_name}\n"

# -----------------------------------------------------------------------
# Announcements
# -----------------------------------------------------------------------
announcements:
  game-start:
    title: "&6&lGame Start!"
    subtitle: "&e{game_name}"
    sound: ENTITY_ENDER_DRAGON_GROWL

  game-end:
    title: "&6&lGame Over!"
    subtitle: "&e{winner} wins!"
    sound: UI_TOAST_CHALLENGE_COMPLETE

  round-start:
    title: "&6&lRound {round} Started!"
    subtitle: "&7Multiplier: &e{multiplier}x"
    sound: BLOCK_NOTE_BLOCK_PLING

  tournament-start:
    title: "&6&lKMC Tournament Started!"
    subtitle: "&eMay the best team win!"
    sound: ENTITY_LIGHTNING_BOLT_THUNDER

  vote-start:
    title: "&6&lVote for the next game!"
    subtitle: "&7Type the number in chat"
    sound: BLOCK_NOTE_BLOCK_CHIME
