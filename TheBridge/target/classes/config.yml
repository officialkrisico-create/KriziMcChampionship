# ================================================================
# The Bridge — Configuration
# ================================================================

game:
  # First team to this many goals wins (default 5)
  goals-to-win: 5
  
  # Maximum game duration. When timer hits 0, team with most goals wins.
  max-duration-seconds: 480       # 8 minutes
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Block placement cleanup batch size (per tick during clear)
  cleanup-batch-size: 50

kit:
  # Number of wool blocks given (refilled to this count on respawn)
  wool-count: 64

points:
  # Per-goal — awarded immediately to the scorer
  per-goal: 25
  
  # Per-kill — awarded immediately to the killer
  per-kill: 5
  
  # Final team placement bonuses
  team-first-place: 250
  team-second-place: 150
  team-third-place: 100
  team-participation: 25

# Arena (set via /bridge commands)
arena:
  world: ""
  void-y: 0
  teams: {}
