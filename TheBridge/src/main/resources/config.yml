# ================================================================
# The Bridge — Configuration
# ================================================================

game:
  # First team to this many goals wins (default 5)
  goals-to-win: 5
  
  # Maximum game duration. When timer hits 0, team with most goals wins.
  max-duration-seconds: 480       # 8 minutes
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Block placement cleanup batch size (per tick during clear)
  cleanup-batch-size: 50

kit:
  # Number of wool blocks given (refilled to this count on respawn)
  wool-count: 64

points:
  # Per goal scored — to the scoring player
  per-goal: 50

  # Per assist — to the player who hit/aided the scorer's path.
  # An assist is credited to the most recent player who damaged the
  # scorer's most-recent enemy kill within ASSIST-WINDOW-SECONDS.
  per-assist: 20
  assist-window-seconds: 8

  # Per kill
  per-kill: 8

  # Per round won — every member of the winning team gets this.
  per-round-win: 10

  # Final placement bonuses (kept for tournament integration)
  team-first-place: 250
  team-second-place: 150
  team-third-place: 100
  team-participation: 25

# Arena (set via /bridge commands)
arena:
  world: ""
  void-y: 0
  teams: {}
