name: Spleef
version: 1.0.0
main: nl.kmc.spleef.SpleefPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Spleef minigame for KMC tournaments

commands:
  spleef:
    description: Spleef control + setup
    aliases: [sp]
    usage: /spleef <start|stop|setarena|...>
    permission: spleef.admin

permissions:
  spleef.admin:
    description: Spleef admin commands
    default: op
