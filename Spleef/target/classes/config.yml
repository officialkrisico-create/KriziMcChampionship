# ================================================================
# Spleef — Configuration
# ================================================================
# Classic spleef: break the snow floor under opponents until they
# fall into the void. Solo or team scoring.
# ================================================================

game:
  # Maximum game duration. When timer expires, ranking is by blocks
  # broken (most = best, then alive players win over eliminated)
  max-duration-seconds: 300        # 5 minutes
  
  # Pre-game countdown
  countdown-seconds: 15
  
  # Floor block material (default snow blocks for classic look)
  floor-material: SNOW_BLOCK
  
  # Shovel material the players get
  shovel-material: DIAMOND_SHOVEL
  
  # Apply Efficiency V to the shovel (instant break)
  shovel-efficiency: true
  
  # Floor placement chunk size (blocks per tick during async placement)
  # Larger = faster placement but more lag during placement
  placement-batch-size: 50

# ================================================================
# Snowball powerups
# ================================================================

powerups:
  enabled: true
  
  # Seconds between snowball drops
  interval-seconds: 25
  
  # How many snowballs in each drop
  snowball-count: 4
  
  # Knockback strength when a snowball hits a player
  # 1.0 = vanilla, 2.0 = double, etc.
  snowball-knockback: 1.5

# ================================================================
# Scoring
# ================================================================

points:
  # Per block broken (small bonus to encourage active play, not camping)
  per-block-broken: 1
  
  # Placement bonuses (1st = winner, 2nd = last to die, etc.)
  first-place: 250
  second-place: 150
  third-place: 100
  participation: 25

# ================================================================
# Arena (set via /spleef commands)
# ================================================================

arena:
  world: ""
  layers: {}
  player-spawns: []
  void-y: 0
