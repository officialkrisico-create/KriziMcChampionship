name: SkyWars
version: 1.0.0
main: nl.kmc.skywars.SkyWarsPlugin
api-version: '1.21'
authors: [KMC]
depend: [KMCCore]
description: Team SkyWars minigame for KMC tournaments

commands:
  skywars:
    description: SkyWars control + setup
    aliases: [sw]
    usage: /skywars <start|stop|setworld|addisland|...>
    permission: skywars.admin

permissions:
  skywars.admin:
    description: SkyWars admin commands
    default: op
