# ================================================================
# SkyWars — Configuration
# ================================================================

game:
  # Pre-game countdown (seconds)
  countdown-seconds: 15
  
  # Grace period after countdown — chests can be opened, no PvP yet
  grace-seconds: 10
  
  # Maximum game duration after grace ends. When timer expires,
  # ranking is by alive count → kills.
  max-duration-seconds: 600       # 10 minutes
  
  # When this many seconds have elapsed in ACTIVE phase, deathmatch
  # phase starts (Glowing applied to all alive, particle ring shrinks).
  # Set higher than max-duration-seconds to disable deathmatch.
  deathmatch-trigger-seconds: 360  # 6 minutes
  
  # Particle ring at start of deathmatch (radius in blocks from middle)
  deathmatch-ring-start: 40
  
  # How fast the ring shrinks (blocks per second)
  deathmatch-ring-shrink-per-sec: 0.5

points:
  # Per kill — unchanged from previous config
  per-kill: 25

  # Living-while-someone-dies — every still-alive player gets this
  # each time someone is eliminated.
  living-while-someone-dies: 5

  # Personal placement (1st = winner, then descending)
  # 1st = 250, -10 per place, floor 0.
  placement:
    1:  250
    2:  240
    3:  230
    4:  220
    5:  210
    6:  200
    7:  190
    8:  180
    9:  170
    10: 160
    11: 150
    12: 140
    13: 130
    14: 120
    15: 110
    16: 100
    17:  90
    18:  80
    19:  70
    20:  60
    21:  50
    22:  40
    23:  30
    24:  20
    25:  10
    "default": 0

# ================================================================
# Loot tables
# ================================================================
# Each entry: material + min/max amount + chance + optional enchants.
# When a chest is filled, every entry is rolled independently against
# its chance, then 3-7 candidates are placed in random slots.

loot:
  min-items-per-chest: 3
  max-items-per-chest: 7
  
  # Island chests — basic gear
  island:
    - { material: WOODEN_SWORD, min: 1, max: 1, chance: 0.4 }
    - { material: STONE_SWORD, min: 1, max: 1, chance: 0.3 }
    - { material: LEATHER_HELMET, min: 1, max: 1, chance: 0.4 }
    - { material: LEATHER_CHESTPLATE, min: 1, max: 1, chance: 0.4 }
    - { material: LEATHER_LEGGINGS, min: 1, max: 1, chance: 0.3 }
    - { material: LEATHER_BOOTS, min: 1, max: 1, chance: 0.3 }
    - { material: GOLDEN_HELMET, min: 1, max: 1, chance: 0.15 }
    - { material: COBBLESTONE, min: 16, max: 32, chance: 0.7 }
    - { material: OAK_PLANKS, min: 8, max: 16, chance: 0.6 }
    - { material: BREAD, min: 2, max: 5, chance: 0.5 }
    - { material: APPLE, min: 1, max: 3, chance: 0.4 }
    - { material: FISHING_ROD, min: 1, max: 1, chance: 0.2 }
    - { material: BOW, min: 1, max: 1, chance: 0.25 }
    - { material: ARROW, min: 4, max: 12, chance: 0.5 }
    - { material: WATER_BUCKET, min: 1, max: 1, chance: 0.15 }
    - { material: LADDER, min: 8, max: 16, chance: 0.3 }
  
  # Middle chests — better loot
  middle:
    - { material: IRON_SWORD, min: 1, max: 1, chance: 0.5 }
    - { material: DIAMOND_SWORD, min: 1, max: 1, chance: 0.15 }
    - { material: IRON_HELMET, min: 1, max: 1, chance: 0.4 }
    - { material: IRON_CHESTPLATE, min: 1, max: 1, chance: 0.4 }
    - { material: IRON_LEGGINGS, min: 1, max: 1, chance: 0.35 }
    - { material: IRON_BOOTS, min: 1, max: 1, chance: 0.35 }
    - { material: DIAMOND_HELMET, min: 1, max: 1, chance: 0.1 }
    - { material: DIAMOND_CHESTPLATE, min: 1, max: 1, chance: 0.08 }
    - { material: GOLDEN_APPLE, min: 1, max: 2, chance: 0.6 }
    - { material: ENCHANTED_GOLDEN_APPLE, min: 1, max: 1, chance: 0.05 }
    - { material: ENDER_PEARL, min: 1, max: 2, chance: 0.3 }
    - { material: BOW, min: 1, max: 1, chance: 0.5, enchants: { POWER: 1 } }
    - { material: ARROW, min: 8, max: 16, chance: 0.7 }
    - { material: COBBLESTONE, min: 32, max: 64, chance: 0.6 }
    - { material: TNT, min: 1, max: 3, chance: 0.2 }
    - { material: FLINT_AND_STEEL, min: 1, max: 1, chance: 0.25 }
    - { material: SPLASH_POTION, min: 1, max: 1, chance: 0.15 }

# Arena (set via /skywars commands)
arena:
  world: ""
  void-y: 0
  islands: {}
  middle: null
