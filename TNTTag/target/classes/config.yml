# ================================================================
# TNT Tag — Configuration
# ================================================================

# Generic lifecycle (BaseGameManager). Players are frozen during the countdown
# and the first round starts right at "GO" — no grace delay.
games:
  tnt_tag:
    countdown: 5
    grace-period: 0

# ── Cinematic start (intro → tutorial → countdown → GO) ─────────────────────
start-flow:
  introduction: true
  tutorial: true
  countdown: true
start-sequence:
  intro-seconds: 5
  tutorial-seconds: 10
  countdown-seconds: 5

game:
  # Time between rounds (seconds)
  intermission-seconds: 4

  # Dynamic per-round timers (round 1, 2, 3, ... ; last value repeats).
  round-timers: [30, 28, 26, 24, 20]

  # Base number of TNT holders. Scales DOWN automatically in the late game
  # (≤7 alive → 1, showdown → 1).
  tnt-holders-base: 2

  # Final Showdown (2 players): one bomb, faster timer, shrinking border.
  showdown-round-seconds: 15
  showdown-border-seconds: 25

  # Tag-pass cooldown (ms) — prevents instant bomb flicker.
  tag-cooldown-ms: 1200

  # Range (blocks) within which "it" players auto-tag others (also melee hit).
  tag-range: 1.6

  # Visuals on "it" players
  tnt-helmet: true
  glowing: true

# ── Powerups (spawn at /tnttag addpowerup spots) ────────────────────────────
powerups:
  spawn-interval-seconds: 12

# ── Chaos events ────────────────────────────────────────────────────────────
chaos:
  enabled: true
  min-interval-seconds: 60
  max-interval-seconds: 90

points:
  # Per round survived (alive at end of round, not "it" when bomb went off)
  round-survive: 60

  # Per tag (when you pass the bomb to someone else)
  per-tag: 10

  # Bonus for the LAST player still alive in the entire game
  last-alive-bonus: 50

  # Living-while-someone-dies — every still-alive player gets this when
  # ANY player is eliminated.
  living-while-someone-dies: 5

  # Final personal placement bonuses (tiered curve)
  placement:
    1:  250
    2:  240
    3:  230
    4:  220
    5:  210
    6:  200
    7:  190
    8:  180
    9:  170
    10: 160
    11: 150
    12: 140
    13: 130
    14: 120
    15: 110
    16: 100
    17:  90
    18:  80
    19:  70
    20:  60
    21:  50
    22:  40
    23:  30
    24:  20
    25:  10
    "default": 0

# Arena (set via /tnttag commands)
arena:
  world: ""
  spawns: []
  powerups: []
  void-y: 0
  border-radius: 0
