# ================================================================
# Mob Mayhem — Configuration
# ================================================================

# Template world to clone per game (one clone per team)
world:
  template-name: "mm_template"

game:
  # Time between waves (seconds) — break for players to regroup
  intermission-seconds: 15
  
  # Pre-game countdown before wave 1
  countdown-seconds: 15
  
  # If a wave's timer expires, force-kill remaining mobs and continue?
  force-end-wave-on-timeout: true
  
  # PvP enabled inside arenas (probably no for survival, yes for chaos)
  pvp-enabled: false
  
  # Keep inventory on player death? (player is eliminated regardless)
  keep-inventory: false

# ================================================================
# Modifiers — random buffs picked per wave
# ================================================================

modifiers:
  # Chance per wave that ANY modifier rolls (0.0 = never, 1.0 = always)
  chance: 0.4
  
  # If a modifier rolls, chance for a 2nd one to also stack
  second-chance: 0.15
  
  # Which modifiers are eligible to roll (omit to disable)
  enabled:
    - DOUBLE_MOBS
    - SPEED_MOBS
    - LOW_VISIBILITY
    - EXPLOSIVE_MOBS
    - HEALTHY_MOBS
    - POISON_TOUCH

# ================================================================
# Scoring
# ================================================================

points:
  # Per-mob points (overridden by WaveLibrary if present)
  per-mob-default: 2
  per-boss-mob: 50
  
  # Bonus for completing a wave (alive at the end)
  wave-survived-bonus: 25
  wave-survived-bonus-boss: 100
  
  # Final placement (team that survived longest)
  team-first-place: 250
  team-second-place: 150
  team-third-place: 100
  team-participation: 25

# ================================================================
# Arena (set via /mm setspawn / /mm addmobspawn)
# ================================================================

arena:
  player-spawn: {}
  mob-spawns: []
